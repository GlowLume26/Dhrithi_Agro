<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Orders - Drithi Agro</title>
  <link rel="stylesheet" href="../css/style.css?v=3"/>
  <style>
    body { background: #f0f4f0; }
    .orders-page { max-width: 900px; margin: 0 auto; padding: 30px 20px; }
    .orders-page h1 { font-size: 26px; font-weight: 800; color: #1b5e20; margin-bottom: 24px; }
    .order-filter { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
    .of-btn { padding: 8px 18px; border-radius: 20px; border: 2px solid #e0e0e0; background: white; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; color: #666; }
    .of-btn.active, .of-btn:hover { background: #2e7d32; color: white; border-color: #2e7d32; }
    .order-card { background: white; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); margin-bottom: 16px; overflow: hidden; }
    .order-card-header { background: #f9fbe7; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; border-bottom: 1px solid #e8f5e9; }
    .order-id   { font-size: 13px; font-weight: 700; color: #1b5e20; }
    .order-date { font-size: 12px; color: #888; margin-top: 2px; }
    .order-status { padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; white-space: nowrap; }
    .status-PLACED          { background: #e3f2fd; color: #1565c0; }
    .status-CONFIRMED       { background: #e8f5e9; color: #2e7d32; }
    .status-PACKED          { background: #f3e5f5; color: #6a1b9a; }
    .status-SHIPPED         { background: #e3f2fd; color: #1565c0; }
    .status-OUT_FOR_DELIVERY{ background: #fff3e0; color: #e65100; }
    .status-DELIVERED       { background: #e8f5e9; color: #2e7d32; }
    .status-CANCELLED       { background: #ffebee; color: #c62828; }
    .status-RETURNED        { background: #fce4ec; color: #880e4f; }
    .order-items { padding: 16px 20px; }
    .order-item-row { display: flex; gap: 14px; align-items: center; padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
    .order-item-row:last-child { border-bottom: none; }
    .order-item-row img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; border: 1px solid #e8f5e9; flex-shrink: 0; background: #f5f5f5; }
    .order-item-row h5 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .order-item-row span { font-size: 12px; color: #888; }
    .item-price { margin-left: auto; font-size: 14px; font-weight: 700; color: #1b5e20; white-space: nowrap; }
    .order-card-footer { padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; border-top: 1px solid #f0f0f0; }
    .order-total { font-size: 16px; font-weight: 800; color: #1b5e20; }
    .order-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .oa-btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: 2px solid; }
    .oa-btn.primary { background: #2e7d32; color: white; border-color: #2e7d32; }
    .oa-btn.primary:hover { background: #1b5e20; }
    .oa-btn.danger  { background: white; color: #e53935; border-color: #e53935; }
    .oa-btn.danger:hover { background: #ffebee; }

    /* LOGIN PROMPT */
    .login-prompt { background: white; border-radius: 14px; padding: 50px 30px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
    .login-prompt h3 { font-size: 20px; font-weight: 800; color: #1b5e20; margin: 16px 0 10px; }
    .login-prompt p { color: #666; font-size: 14px; margin-bottom: 20px; }
    .login-prompt a { background: #2e7d32; color: white; padding: 12px 28px; border-radius: 10px; font-weight: 700; font-size: 14px; display: inline-block; }

    /* EMPTY STATE */
    .empty-orders { background: white; border-radius: 14px; padding: 60px 30px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
    .empty-orders h3 { font-size: 20px; font-weight: 800; color: #1b5e20; margin: 16px 0 10px; }
    .empty-orders a { background: #2e7d32; color: white; padding: 12px 28px; border-radius: 10px; font-weight: 700; font-size: 14px; display: inline-block; margin-top: 10px; }

    /* TRACKING MODAL */
    .tracking-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center; padding: 16px; }
    .tracking-modal.show { display: flex; }
    .tracking-box { background: white; border-radius: 20px; padding: 28px; max-width: 480px; width: 100%; max-height: 90vh; overflow-y: auto; }
    .tracking-box h3 { font-size: 18px; font-weight: 800; color: #1b5e20; }
    .track-step { display: flex; gap: 14px; }
    .track-left { display: flex; flex-direction: column; align-items: center; }
    .track-dot  { width: 16px; height: 16px; border-radius: 50%; background: #e0e0e0; flex-shrink: 0; }
    .track-dot.done   { background: #2e7d32; }
    .track-dot.active { background: #f9a825; box-shadow: 0 0 0 4px rgba(249,168,37,0.3); }
    .track-line { width: 2px; flex: 1; background: #e0e0e0; min-height: 28px; }
    .track-line.done { background: #2e7d32; }
    .track-info { padding-bottom: 22px; }
    .track-info h5 { font-size: 14px; font-weight: 700; color: #333; }
    .track-info p  { font-size: 12px; color: #888; margin-top: 2px; }

    @media (max-width: 600px) {
      .orders-page { padding: 16px 12px; }
      .order-card-header { flex-direction: column; align-items: flex-start; }
      .order-item-row img { width: 48px; height: 48px; }
    }
  </style>
</head>
<body>
<div id="header-root"></div>

<div style="background:#f5f5f5;padding:12px 20px;font-size:13px;color:#666;">
  <a href="../index.html" style="color:#2e7d32;">Home</a> › My Orders
</div>

<div class="orders-page">
  <h1>📦 My Orders</h1>

  <div class="order-filter" id="filterBtns">
    <button class="of-btn active" onclick="filterOrders('', this)">All</button>
    <button class="of-btn" onclick="filterOrders('PLACED', this)">Placed</button>
    <button class="of-btn" onclick="filterOrders('CONFIRMED', this)">Confirmed</button>
    <button class="of-btn" onclick="filterOrders('SHIPPED', this)">Shipped</button>
    <button class="of-btn" onclick="filterOrders('DELIVERED', this)">Delivered</button>
    <button class="of-btn" onclick="filterOrders('CANCELLED', this)">Cancelled</button>
  </div>

  <div id="ordersContainer">
    <div style="text-align:center;padding:40px;color:#888;">⏳ Loading orders...</div>
  </div>
</div>

<!-- TRACKING MODAL -->
<div class="tracking-modal" id="trackingModal">
  <div class="tracking-box">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <h3>📍 Order Tracking</h3>
      <button onclick="closeTracking()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#666;">✕</button>
    </div>
    <div id="trackingContent"></div>
    <button onclick="closeTracking()" style="width:100%;background:#2e7d32;color:white;border:none;padding:12px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:16px;">Close</button>
  </div>
</div>

<div id="footer-root"></div>
<script src="../js/components.js?v=3"></script>
<script>
  const API   = 'http://localhost/drithi-agro/backend/index.php?route=';
  const token = localStorage.getItem('da_token');

  document.getElementById('header-root').innerHTML = renderHeader('orders');
  document.getElementById('footer-root').innerHTML = renderFooter();

  const STATUS_STEPS = ['PLACED','CONFIRMED','PACKED','SHIPPED','OUT_FOR_DELIVERY','DELIVERED'];
  const STATUS_LABELS = {
    PLACED:           '🛒 Order Placed',
    CONFIRMED:        '✅ Order Confirmed',
    PACKED:           '📦 Packed & Ready',
    SHIPPED:          '🚚 Shipped',
    OUT_FOR_DELIVERY: '🛵 Out for Delivery',
    DELIVERED:        '🎉 Delivered',
    CANCELLED:        '❌ Cancelled',
    RETURNED:         '↩️ Returned'
  };

  if (!token) {
    document.getElementById('ordersContainer').innerHTML = `
      <div class="login-prompt">
        <div style="font-size:60px;">📦</div>
        <h3>Login to view your orders</h3>
        <p>Please login to see your order history and track deliveries.</p>
        <a href="login.html">🔐 Login / Sign Up</a>
      </div>`;
  } else {
    loadOrders('');
  }

  async function loadOrders(status) {
    const container = document.getElementById('ordersContainer');
    container.innerHTML = '<div style="text-align:center;padding:40px;color:#888;">⏳ Loading...</div>';
    try {
      const qs  = status ? '&status=' + status : '';
      const res = await fetch(API + 'orders' + qs, {
        headers: { 'Authorization': 'Bearer ' + token }
      }).then(r => r.json());

      if (!res.success || !res.data.length) {
        container.innerHTML = `
          <div class="empty-orders">
            <div style="font-size:64px;">📭</div>
            <h3>${status ? 'No ' + status.toLowerCase() + ' orders' : 'No orders yet'}</h3>
            <p>You haven't placed any orders yet. Start shopping!</p>
            <a href="categories.html">🌾 Browse Products</a>
          </div>`;
        return;
      }

      container.innerHTML = res.data.map(order => renderOrderCard(order)).join('');
    } catch(e) {
      container.innerHTML = '<div style="text-align:center;padding:40px;color:#c62828;">❌ Failed to load orders. Make sure the server is running.</div>';
    }
  }

  function renderOrderCard(o) {
    const statusClass = 'status-' + o.order_status;
    const statusLabel = STATUS_LABELS[o.order_status] || o.order_status;
    const date = new Date(o.placed_at).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
    const items = (o.items || []).map(item => `
      <div class="order-item-row">
        <img src="${item.product_image || 'https://images.unsplash.com/photo-1574943320219-553eb213f72d?w=200&q=80'}"
             alt="${item.product_name}"
             onerror="this.src='https://images.unsplash.com/photo-1574943320219-553eb213f72d?w=200&q=80'"/>
        <div>
          <h5>${item.product_name}</h5>
          <span>Qty: ${item.quantity} • ₹${Number(item.unit_price).toLocaleString('en-IN')} each</span>
        </div>
        <span class="item-price">₹${Number(item.total_price).toLocaleString('en-IN')}</span>
      </div>`).join('');

    const canCancel   = ['PLACED','CONFIRMED'].includes(o.order_status);
    const isDelivered = o.order_status === 'DELIVERED';

    return `
      <div class="order-card">
        <div class="order-card-header">
          <div>
            <div class="order-id">Order #${o.order_number}</div>
            <div class="order-date">Placed on ${date} • ${o.item_count || (o.items||[]).length} item(s)</div>
          </div>
          <span class="order-status ${statusClass}">${statusLabel}</span>
        </div>
        <div class="order-items">${items}</div>
        <div class="order-card-footer">
          <div>
            <div class="order-total">Total: ₹${Number(o.total_amount).toLocaleString('en-IN')}</div>
            <div style="font-size:12px;color:#888;margin-top:2px;">${o.payment_method} • ${o.payment_status}</div>
          </div>
          <div class="order-actions">
            <button class="oa-btn primary" onclick="showTracking(${JSON.stringify(o).replace(/"/g,'&quot;')})">📍 Track</button>
            ${canCancel   ? `<button class="oa-btn danger" onclick="cancelOrder(${o.id})">✕ Cancel</button>` : ''}
            ${isDelivered ? `<button class="oa-btn primary" onclick="location.href='categories.html'">🔄 Buy Again</button>` : ''}
          </div>
        </div>
      </div>`;
  }

  function filterOrders(status, btn) {
    document.querySelectorAll('.of-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadOrders(status);
  }

  async function cancelOrder(orderId) {
    if (!confirm('Are you sure you want to cancel this order?')) return;
    const res = await fetch(API + 'orders&id=' + orderId, {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer ' + token }
    }).then(r => r.json());
    if (res.success) { showToast('✅ Order cancelled successfully.'); loadOrders(''); }
    else showToast('❌ ' + (res.message || 'Could not cancel order.'));
  }

  function showTracking(order) {
    const steps  = STATUS_STEPS;
    const curIdx = steps.indexOf(order.order_status);
    const isCancelled = order.order_status === 'CANCELLED';

    let stepsHtml = '';
    if (isCancelled) {
      stepsHtml = `<div class="track-step">
        <div class="track-left"><div class="track-dot" style="background:#e53935;"></div></div>
        <div class="track-info"><h5>❌ Order Cancelled</h5><p>This order has been cancelled.</p></div>
      </div>`;
    } else {
      steps.forEach((step, i) => {
        const isDone   = i < curIdx;
        const isActive = i === curIdx;
        const isLast   = i === steps.length - 1;
        stepsHtml += `
          <div class="track-step">
            <div class="track-left">
              <div class="track-dot ${isDone ? 'done' : isActive ? 'active' : ''}"></div>
              ${!isLast ? `<div class="track-line ${isDone ? 'done' : ''}"></div>` : ''}
            </div>
            <div class="track-info">
              <h5>${isDone || isActive ? '✅ ' : '⬜ '}${STATUS_LABELS[step] || step}</h5>
              <p>${isDone || isActive ? 'Completed' : 'Pending'}</p>
            </div>
          </div>`;
      });
    }

    document.getElementById('trackingContent').innerHTML = `
      <div style="background:#e8f5e9;border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:13px;">
        <b>${order.order_number}</b> • ₹${Number(order.total_amount).toLocaleString('en-IN')}
        ${order.delivered_at ? `<br><span style="color:#2e7d32;font-weight:600;">Delivered: ${new Date(order.delivered_at).toLocaleDateString('en-IN')}</span>` : ''}
      </div>
      ${stepsHtml}`;

    document.getElementById('trackingModal').classList.add('show');
  }

  function closeTracking() {
    document.getElementById('trackingModal').classList.remove('show');
  }
</script>
</body>
</html>
