<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login - Drithi Agro</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    body { background: linear-gradient(135deg, #0d2b0d 0%, #1b5e20 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .admin-login-box { background: white; border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .admin-logo { text-align: center; margin-bottom: 32px; }
    .admin-logo .al-icon { width: 72px; height: 72px; background: linear-gradient(135deg, #1b5e20, #2e7d32); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 14px; }
    .admin-logo h2 { font-size: 22px; font-weight: 800; color: #1b5e20; }
    .admin-logo span { font-size: 12px; color: #888; background: #ffebee; color: #c62828; padding: 3px 10px; border-radius: 10px; font-weight: 700; }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .form-group label { font-size: 13px; font-weight: 600; color: #333; }
    .form-group input { padding: 12px 14px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 14px; outline: none; transition: border 0.2s; }
    .form-group input:focus { border-color: #1b5e20; }
    .login-btn { width: 100%; background: #1b5e20; color: white; border: none; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
    .login-btn:hover { background: #0d2b0d; transform: translateY(-1px); }
    .security-note { text-align: center; font-size: 12px; color: #888; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="admin-login-box">
    <div class="admin-logo">
      <div class="al-icon">🛡️</div>
      <h2>Drithi Agro Admin</h2>
      <span>SECURE ADMIN ACCESS</span>
    </div>
    <div class="form-group">
      <label>Admin Email</label>
      <input type="email" id="adminEmail" placeholder="admin@drithiagro.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="adminPass" placeholder="Enter admin password"/>
    </div>
    <button class="login-btn" onclick="adminLogin()">🔐 Login to Admin Panel</button>
    <div class="security-note">🔒 This area is restricted to authorized personnel only.<br/>All access attempts are logged.</div>
  </div>
  <script>
    function adminLogin() {
      const email = document.getElementById('adminEmail').value;
      const pass = document.getElementById('adminPass').value;
      if (!email || !pass) { alert('Please enter email and password.'); return; }
      // Demo: redirect to admin dashboard
      location.href = 'admin-dashboard.html';
    }
  </script>
</body>
</html>
